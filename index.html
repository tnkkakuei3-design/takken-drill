<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA: manifest -->
    <link rel="manifest" href="./manifest.json" />

    <!-- PWA: theme color -->
    <meta name="theme-color" content="#F8F8FA" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#09090B" media="(prefers-color-scheme: dark)" />

    <!-- PWA: iOS / Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="宅建ドリル" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <!-- SEO -->
    <meta name="description" content="宅建試験対策AIドリル - 弱点分析・OX一問一答・暗記カード・学習プランナー" />

    <title>宅建ドリル</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #09090B; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Service Worker の登録
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/takken-drill/sw.js')
            .then((registration) => {
              console.log('[SW] 登録成功:', registration.scope);
            })
            .catch((error) => {
              console.error('[SW] 登録失敗:', error);
            });
        });
      }
    </script>
  </body>
</html>
